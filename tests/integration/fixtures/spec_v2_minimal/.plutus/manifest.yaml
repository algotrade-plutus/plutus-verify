schema_version: "2.0"
repo:
  name: SpecV2Minimal
  primary_language: python
env:
  base: python
  python_version: "3.11"
  requirements_file: requirements.txt
secrets: []
data_sources:
  processed: []
  raw:
    - kind: github_release
      url: https://example.com/raw.tar.gz
      expected_layout: ["data/raw/*.parquet"]
      satisfies: [data_preparation]
steps:
  - id: data_preparation
    nine_step: step_2_data_preparation
    required: true
    network: bridge
    command: "python -c 'print(\"collect\")'"
    outputs: ["data/raw/x.parquet"]
  - id: forming_rules
    nine_step: step_3_forming_set_of_rules
    required: true
    command: "python -c 'print(\"preprocess\")'"
    inputs: [data/raw]
    outputs: ["data/processed/x.parquet"]
  - id: in_sample
    nine_step: step_4_in_sample
    required: true
    command: "python -c 'print(\"backtest\")'"
    inputs: [data/processed]
    outputs: ["out/metrics.json"]
expected:
  - step_id: in_sample
    metrics:
      - name: sharpe_ratio
        display_name: "Sharpe Ratio"
        value: 0.85
        tolerance: {kind: relative, value: 0.05}
    artifacts: []
nine_step_coverage:
  step_2_data_preparation: {present: true, section: "Data"}
  step_3_forming_set_of_rules: {present: true, section: "Preprocess"}
  step_4_in_sample: {present: true, section: "In-sample"}
